<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GameVeredito{% endblock %}</title>

  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Smooth transition for HTMX content swapping */
    .htmx-fading {
      opacity: 0;
      transition: opacity 200ms ease-in;
    }
  </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col antialiased">

  <header class="w-full border-b border-gray-800 bg-gray-900/80 backdrop-blur-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/" class="flex items-center gap-2 group">
        <span class="text-2xl">🎮</span>
        <span
          class="font-bold text-xl bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-emerald-600 group-hover:from-green-300 group-hover:to-emerald-500 transition-all">
          GameVeredito
        </span>
      </a>

      <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
        <a href="/" class="hover:text-green-400 transition-colors">Home</a>
        <a href="#" class="hover:text-green-400 transition-colors">About</a>
        <a href="https://github.com/andrebonfim" target="_blank" class="hover:text-white transition-colors">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="flex-grow container mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-gray-800 py-6 mt-auto">
    <div class="container mx-auto text-center text-sm text-gray-500">
      <p>&copy; 2026 GameVeredito. Built with 🐍 Python, FastAPI & HTMX.</p>
    </div>
  </footer>

</body>

</html>
